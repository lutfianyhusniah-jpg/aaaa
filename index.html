<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animasi Icon</title>

    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.15.0/gsap.min.js" integrity="sha512-Qrpii3NEFZ02RN6ZqpTu6pS/5PEq7EzBYJLki3AKBd8IncrlAwQdZHzExYwS0+b1NM0/qfxI1GOhqWLVosocDA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">

        <!-- ===== HEADER CUACA ===== -->
        <div class="weather-header">
            <div class="weather-temp">26°C</div>
            <div class="weather-condition">Cerah</div>
            <div class="weather-time">09:44</div>
            <div class="weather-date">23/07/2026</div>
        </div>

        <!-- ===== GRID IKON ===== -->
        <div class="container">

            <img src="image/Artboard 1.svg" class="truck" alt="truck">
            <img src="image/Artboard 2.svg" class="money" alt="money">
            <img src="image/7.svg" class="coin" alt="coin">
            <img src="image/Artboard 3.svg" class="calendar" alt="calendar">
            <img src="image/Artboard 4.svg" class="plane" alt="plane">

            <img src="image/Artboard 5.svg" class="location" alt="location">
            <img src="image/5.svg" class="loc" alt="loc">
            <img src="image/Artboard 6.svg" class="box" alt="box">
            <img src="image/6.svg" class="ceklis" alt="ceklis">
            <img src="image/Artboard 7.svg" class="courier" alt="courier">

            <img src="image/2.svg" class="paket" alt="paket">
            <img src="image/Artboard 8.svg" class="globe" alt="globe">
            <img src="image/4.svg" class="luc" alt="luc">
            <img src="image/Artboard 9.svg" class="ship" alt="ship">
            <img src="image/9.svg" class="air" alt="air">

            <img src="image/Artboard 10.svg" class="document" alt="document">
            <img src="image/10.svg" class="tulisan" alt="tulisan">

            <!-- Jika ada lebih dari 15 ikon, tambahkan di sini -->
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
